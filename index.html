<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Prismatix public-safe frontend starter" />
    <title>Prismatix Public Starter</title>
    <link rel="icon" type="image/svg+xml" href="/prismatix-icon-draft.svg" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #07131a;
        color: #e8f1f4;
      }

      #root {
        min-height: 100%;
      }

      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-family: "Segoe UI", sans-serif;
        color: #8cc9d9;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(140, 201, 217, 0.2);
        border-top-color: #8cc9d9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>Loading Prismatix Public Starter...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
